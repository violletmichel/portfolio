<!DOCTYPE html>
<html lang="fr">

<head>
    <title>Snake</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <div id="author">
            <h1>SNAKE</h1> <span>par Michel</span>
        </div>
        <div class="game-wrapper">
            <div class="wrapper">
                <button id="replay">
                    <i class="fas fa-play"></i>
                    RECOMMENCER
                </button>
                <div id="canvas"></div>
                <div id="ui">
                    <h2>SCORE</h2>
                    <span id="score">00</span>
                </div>
            </div>
    <div id="controls">
      <button id="up" class="touch-control">&#8593;</button>
      <button id="left" class="touch-control">&#8592;</button>
      <button id="down" class="touch-control">&#8595;</button>
      <button id="right" class="touch-control">&#8594;</button>
    </div>
  </div>
</div>
</div>
<script src="script.js"></script>
</body>

</html>
